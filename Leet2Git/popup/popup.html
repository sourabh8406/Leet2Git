<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leet2Git</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#FFA116" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="#FFA116" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="#FFA116" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">Leet<span class="logo-accent">2</span>Git</span>
      </div>
      <a href="#" id="options-link" class="settings-icon" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </header>

    <div id="view-auth" class="view">
      <div class="auth-illustration">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z" fill="#6e7681"/>
        </svg>
      </div>
      <h2 class="auth-title">Connect to GitHub</h2>
      <p class="auth-desc">Link your GitHub account to automatically push your LeetCode solutions.</p>
      <button id="btn-auth" class="btn btn-primary btn-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        Sign in with GitHub
      </button>
      <p class="auth-note">Only <code>repo</code> scope is requested.</p>
    </div>

    <div id="view-main" class="view hidden">
      <!-- User profile -->
      <div class="profile-card">
        <img id="user-avatar" class="avatar" src="" alt="avatar" />
        <div class="profile-info">
          <span id="user-name" class="username"></span>
          <span id="user-login" class="userlogin"></span>
        </div>
        <button id="btn-logout" class="btn btn-ghost btn-sm" title="Disconnect">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="form-group">
        <label class="label" for="repo-select">Target Repository</label>
        <div class="select-wrapper">
          <select id="repo-select" class="select">
            <option value="">Loading repositories…</option>
          </select>
        </div>
        <button id="btn-create-repo" class="btn btn-ghost btn-sm mt-4">+ Create new repo</button>
      </div>

      <div class="form-group">
        <label class="label" for="branch-input">Branch</label>
        <input id="branch-input" class="input" type="text" value="main" placeholder="main" />
      </div>

      <div class="toggle-row">
        <div>
          <span class="toggle-label">Auto-sync on submission</span>
          <span class="toggle-sub">Push every accepted solution automatically</span>
        </div>
        <label class="toggle">
          <input id="toggle-auto" type="checkbox" checked />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>

      <button id="btn-save" class="btn btn-primary btn-full">Save Settings</button>

      <div class="stats-row">
        <div class="stat">
          <span id="stat-synced" class="stat-value">0</span>
          <span class="stat-label">Synced</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span id="stat-last" class="stat-value">—</span>
          <span class="stat-label">Last sync</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span id="stat-streak" class="stat-value">0</span>
          <span class="stat-label">Day streak</span>
        </div>
      </div>
    </div>

    <div id="status-bar" class="status-bar hidden">
      <span id="status-icon" class="status-icon"></span>
      <span id="status-text" class="status-text"></span>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
